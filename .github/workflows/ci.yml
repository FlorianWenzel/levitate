name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-build:
    name: Backend build + go vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: backend/go.sum
      - name: go vet
        working-directory: backend
        run: go vet ./...
      - name: go build
        working-directory: backend
        run: go build ./...

  frontend-build:
    name: Frontend build (nuxt generate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        working-directory: frontend
        run: npm ci --no-audit --no-fund
      - name: Generate static SPA
        working-directory: frontend
        run: npm run generate

  e2e:
    name: Cypress e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            e2e/package-lock.json

      - name: Bring up the dev stack
        run: docker compose up -d --build

      - name: Wait for backend
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8080/healthz >/dev/null; then
              echo "backend ready"; exit 0
            fi
            sleep 2
          done
          docker compose logs backend
          exit 1

      - name: Wait for frontend
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:3000/ >/dev/null; then
              echo "frontend ready"; exit 0
            fi
            sleep 2
          done
          docker compose logs frontend
          exit 1

      - name: Wait for Keycloak realm
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8081/realms/levitate/.well-known/openid-configuration >/dev/null; then
              echo "keycloak ready"; exit 0
            fi
            sleep 2
          done
          docker compose logs keycloak
          exit 1

      - name: Install Cypress
        working-directory: e2e
        run: npm ci --no-audit --no-fund

      - name: Run Cypress
        working-directory: e2e
        run: npx cypress run

      - name: Collect docker logs on failure
        if: failure()
        run: docker compose logs --no-color > docker-logs.txt

      - name: Upload Cypress screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots
          path: e2e/cypress/screenshots
          if-no-files-found: ignore

      - name: Upload Cypress videos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-videos
          path: e2e/cypress/videos
          if-no-files-found: ignore

      - name: Upload docker logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: docker-logs
          path: docker-logs.txt
          if-no-files-found: ignore

      - name: Tear down
        if: always()
        run: docker compose down -v
